# Example per-project config override
#
# Files in conf.d/*.conf are sourced after sandbox.conf when a sandbox
# starts. Use _PROJECT_DIR to match the project directory and append
# to arrays like READONLY_MOUNTS or EXTRA_WRITABLE_PATHS.
#
# This file is an example — rename or copy it (e.g. genomics.conf)
# and adjust the paths. Files ending in .conf are loaded automatically.

# Guard: only apply when the project dir is under this prefix.
# [[ "$_PROJECT_DIR" == /fh/fast/mylab/genomics/* ]] || return 0
#
# READONLY_MOUNTS+=(
#     "/fh/fast/shared/reference_genomes"
#     "/fh/fast/shared/annotations"
# )
#
# EXTRA_WRITABLE_PATHS+=(
#     "/fh/scratch/delete30/mylab/pipeline-output"
# )
#
# Override environment variable blocking for specific projects.
# ALLOWED_ENV_VARS takes precedence over BLOCKED_ENV_VARS and
# BLOCKED_ENV_PATTERNS (SSH_*, *_TOKEN, CI_*, etc.).
#
# ALLOWED_ENV_VARS+=("MY_PROJECT_TOKEN" "SSH_TTY")
#
# Suppress informational startup output (banner, blocked-var count,
# created/updated-config notices) for this project. Errors and
# FATAL/WARNING safety messages still print. A launch-time SANDBOX_QUIET
# env var overrides this (precedence: env > conf.d > default=false).
# SANDBOX_QUIET=true
#
# Disable IPC isolation for workloads needing host shared memory.
# PRIVATE_IPC=false
#
# Disable /tmp isolation for MPI/NCCL workloads using /tmp sockets.
# PRIVATE_TMP=false
#
# Set per-project environment variables (KEY=VALUE strings).
# Use ${PATH} or other vars to reference the current value.
# The sandbox backend prepends chaperon stubs to PATH after these.
#
# SANDBOX_ENV+=(
#     "XDG_CONFIG_HOME=/path/to/project/.config"
#     "PATH=/path/to/project/bin:${PATH}"
# )
