# sandbox-wrapper.conf — Configuration for sbatch/srun token wrappers
#
# The token wrappers check for config in this order:
#   1. sandbox-wrapper.conf next to the wrapper script (dev/testing)
#   2. Admin sandbox config (path set in _ADMIN_CONF at top of each script,
#      defaults to /app/lib/agent-sandbox/sandbox.conf)
#
# If you use an admin sandbox config (docs/admin/install.md), you can put
# these variables there instead and skip this file entirely — one config
# for both the sandbox and the Slurm enforcement layer.
#
# To use a different admin config location, change _ADMIN_CONF at the
# top of each wrapper script (and ADMIN_CONF in job_submit.lua).

# Path to the bypass token file (single source of truth).
# The sandbox also auto-discovers this: if SANDBOX_BYPASS_TOKEN is not
# set in sandbox.conf, sandbox-lib.sh reads TOKEN_FILE from this file.
# bwrap/firejail hide the token inside the sandbox; Landlock needs eBPF
# LSM protection (token_protect.bpf.c).
TOKEN_FILE="/app/lib/agent-sandbox/.sandbox-bypass-token"

# Real Slurm binaries — where the originals were moved to.
# If the binary hasn't been relocated (PATH-based deployment), the
# wrappers fall back to /usr/bin/sbatch and /usr/bin/srun automatically.
REAL_SBATCH="/usr/libexec/slurm/sbatch"
REAL_SRUN="/usr/libexec/slurm/srun"

# Path to sandbox-exec.sh (used by srun wrapper to sandbox jobs from
# processes that cannot read the token)
SANDBOX_EXEC="/app/lib/agent-sandbox/sandbox-exec.sh"
