# ╔══════════════════════════════════════════════════════════════════╗
# ║  Sandbox Configuration                                           ║
# ║  ~/.claude/sandbox/sandbox.conf                                  ║
# ║                                                                  ║
# ║  Edit this file to customize what the sandboxed agent can see    ║
# ║  and do. Changes take effect the next time you start a sandbox.  ║
# ║                                                                  ║
# ║  ⚠️  REVIEW BEFORE FIRST USE — the defaults ship with example    ║
# ║  paths that should be replaced with your own. Apply the          ║
# ║  principle of least privilege: only expose data the agent        ║
# ║  actually needs. Entries marked (required) are needed for        ║
# ║  the sandbox or Claude Code to function.                         ║
# ╚══════════════════════════════════════════════════════════════════╝


# ── Sandbox Backend ────────────────────────────────────────────
#
# Which isolation backend to use. The sandbox supports two backends:
#
#   auto     — choose the best available backend (default)
#   bwrap    — bubblewrap (mount namespace isolation, paths hidden with ENOENT)
#   landlock — Landlock LSM (filesystem ACL, blocked paths return EACCES)
#
# Both backends provide kernel-enforced filesystem isolation. Differences:
#   - bwrap uses mount namespaces; blocked paths return ENOENT (hidden).
#     Supports file overlays, Slurm binary relocation, and sandbox
#     self-protection.
#   - Landlock uses the LSM framework; blocked paths return EACCES (denied).
#     Works without admin help on Ubuntu 24.04+ where AppArmor blocks bwrap.
#     No mount namespace — Slurm wrapping is PATH-based only, and sandbox
#     scripts are not protected from modification.
#
# Auto-detection picks whichever backend works on your system.

SANDBOX_BACKEND="auto"


# ── User Enumeration Prevention ──────────────────────────────
#
# Filter /etc/passwd inside the sandbox to prevent LDAP/AD user
# enumeration. When true, generates a minimal /etc/passwd (system
# UIDs + current user) and overrides nsswitch.conf to use "files"
# only (no ldap/sss). getent passwd returns ~35 entries instead of
# thousands.
#
# Coverage:
#   bwrap    — overlays /etc/passwd + /etc/nsswitch.conf
#   firejail — blocks NSS daemon sockets (nscd, nslcd, sssd)
#   landlock — not supported (no mount namespace)
#
# Munge, Slurm, and normal user/group resolution are unaffected.
# Set to false if sandboxed processes need LDAP user lookups.

FILTER_PASSWD=true


# ── Writable Project Directory ──────────────────────────────────
#
# The sandbox gives the agent write access to exactly ONE directory
# (the "project dir", set via --project-dir or defaulting to $PWD).
#
# For safety, the project dir must be under one of these prefixes.
# Add paths here if your projects live elsewhere.

ALLOWED_PROJECT_PARENTS=(
    "/fh/fast"
    "/fh/scratch"
    "/hpc/temp"
    "$HOME"
)


# ── Read-Only Mounts ────────────────────────────────────────────
#
# Directories the agent can READ but never write to.
# System paths are needed for basic functionality.
# Add lab or shared data directories as needed.

READONLY_MOUNTS=(
    # ── System (required — sandbox will warn if missing) ──
    "/usr"              # system binaries, shared libraries
    "/lib"              # core shared libraries (libc, ld-linux, etc.)
    "/lib64"            # 64-bit shared libraries (may not exist on all systems)
    "/bin"              # essential commands (bash, ls, cat, etc.)
    "/sbin"             # system binaries (ip, mount — some tools need these)
    "/etc"              # system config (resolv.conf, passwd, localtime, etc.)

    # ── HPC software stack ──
    "/app"              # lmod, modules, site-installed software

    # ── Lab storage (CUSTOMIZE THIS) ──
    # ⚠️  Every path here is fully readable by the agent. Apply least
    # privilege: mount only the data the agent actually needs, not your
    # PI's entire directory tree. The narrower the path, the less data
    # is exposed if the agent misbehaves.
    #
    # To find your PI directory and username:
    #   id -gn | sed 's/_grp$//'   → PI directory name (e.g. setty_m)
    #   whoami                      → your username
    #   ls /fh/fast/$(id -gn | sed 's/_grp$//')/user/$(whoami)
    #
    # Examples (narrow → broad):
    #   "/fh/fast/mylab/user/me"            # just your user dir — recommended
    #   "/fh/fast/mylab"                    # entire lab — broad, use if needed
    # "/fh/fast/mylab/user/me"

    # HPC temp storage
    # "/hpc/temp/mylab"
)


# ── Scratch Filesystems (read-only) ─────────────────────────────
#
# ⚠️  Only include scratch paths the agent needs to read. Each path
# exposes all files underneath it. Remove entries that aren't relevant
# to the agent's task.

SCRATCH_MOUNTS=(
    "/fh/scratch/delete10"
    "/fh/scratch/delete30"
    "/fh/scratch/delete90"
)


# ── Home Directory Strategy ─────────────────────────────────────
#
# The sandbox BLANKS your entire $HOME with an empty tmpfs, then
# re-mounts only the entries listed below. Anything not listed is
# invisible to the agent — this is how credentials like ~/.ssh,
# ~/.aws, ~/.gnupg are blocked.
#
# Both files and directories work here. Missing entries are silently
# skipped, so it's safe to list dotfiles you might not have.

# Subdirectories and files in $HOME to mount READ-ONLY.
# These give the agent access to your tools and shell config
# without exposing secrets.
HOME_READONLY=(
    # ── Shell config (needed for interactive shells inside sandbox) ──
    ".bashrc"               # bash startup — needed for shell inside sandbox
    ".bash_profile"         # bash login — needed for login shell init
    ".profile"              # sh/bash login — needed for POSIX shell init
    ".zshrc"                # zsh startup — needed if using zsh
    ".zprofile"             # zsh login — needed if using zsh
    ".inputrc"              # readline — needed for arrow keys, history, etc.

    # ── Git (needed for git operations inside sandbox) ──
    ".gitconfig"            # git config — needed for commits, user identity

    # ── Editor config (optional — remove if agent doesn't use these) ──
    ".vimrc"                # vim config
    ".vim"                  # vim plugins / runtime
    ".tmux.conf"            # tmux config (only for nested tmux)
    ".dircolors"            # ls color scheme
    ".pythonrc"             # Python startup file

    # ── Tools & runtimes (needed for agent to run commands) ──
    ".linuxbrew"            # Homebrew — bwrap, node, git, etc. (required if installed via brew)
    ".local/bin"            # pip-installed CLI tools
    ".local/share/jupyter"  # Jupyter kernel specs
    ".local/share/claude"   # Claude Code binary versions (required)
    ".cache/claude"         # Claude Code cache (required)
    ".cache/claude-cli-nodejs"  # Claude Code node runtime (required)
    "micromamba"            # micromamba environments (~/micromamba/)
    ".condarc"              # conda config — needed for conda/mamba commands
    ".mambarc"              # mamba config — needed for mamba commands
    # ".config/gh"          # uncomment to allow GitHub CLI access
)

# ── Dotfiles Manager (optional) ──────────────────────────────
#
# If you use a dotfiles manager (stow, chezmoi, yadm, etc.) that
# keeps canonical files in a separate directory and symlinks them
# into $HOME, set DOTFILES_DIR to that directory and list the
# symlink names in HOME_SYMLINKS. The sandbox will mount the
# dotfiles directory read-only and recreate the symlinks.
#
# If your dotfiles live directly in $HOME (the common case), leave
# DOTFILES_DIR="" and just list them in HOME_READONLY above.
DOTFILES_DIR=""

# Symlinks to recreate from $DOTFILES_DIR into $HOME.
# Only used when DOTFILES_DIR is set to a non-empty path.
#
# Example for a ~/.dotfiles setup:
#   DOTFILES_DIR="$HOME/.dotfiles"
#   HOME_SYMLINKS=(".gitconfig" ".vimrc" ".zshrc" ".tmux.conf")
#   # and add ".dotfiles" to HOME_READONLY above
HOME_SYMLINKS=()

# Subdirectories and files of $HOME with WRITE access.
HOME_WRITABLE=(
    ".claude"               # Claude Code session data (required)
    ".claude.json"          # Claude Code onboarding/config state (required)
    ".local/state/claude"   # Claude Code lock files and session state (required)
    ".local/share/claude"   # Claude Code version tracking (required)
    ".cache/uv"             # uv package manager cache
)


# ── Blocked Files ───────────────────────────────────────────────
#
# Specific files that are overlaid with /dev/null — they appear to
# exist but are empty. Use this for files inside writable directories
# that must still be protected.
#
# ⚠️  Backend limitation: BLOCKED_FILES is only respected by the bwrap
# and firejail backends. The Landlock backend cannot block individual
# files under already-granted parent directories — Landlock rules apply
# to entire directory trees, so a file inside a writable directory
# cannot be selectively hidden.
#
# Note: ~/.claude/.credentials.json is NOT blocked — Claude Code needs
# it to authenticate with the Anthropic API. This is the agent's own
# auth token, not a user secret like SSH keys or AWS credentials.

BLOCKED_FILES=(
    # "$HOME/.claude/.credentials.json"   # don't block — Claude needs this to run
)


# ── Additional Blocked Paths ────────────────────────────────────
#
# Paths OUTSIDE $HOME that should be hidden. These are overlaid
# with an empty tmpfs. Use this to block sensitive data directories
# (e.g. clinical data, restricted datasets) that would otherwise
# be visible under a read-only mount.
#
# Example: Block a clinical data subdirectory that's under /fh/fast:
# EXTRA_BLOCKED_PATHS=(
#     "/fh/fast/setty_m/restricted_clinical_data"
# )

EXTRA_BLOCKED_PATHS=()


# ── Device Binding (bwrap only, experimental) ─────────────────
#
# Bind the host's /dev into the sandbox instead of using bwrap's
# minimal devtmpfs. Required for tmux inside the sandbox on kernels
# < 5.4 (bwrap's user-namespace devpts gets ptmxmode=000, breaking
# pty allocation).
#
# Security trade-off: exposes host /dev/pts to the sandbox. On
# kernels < 6.2, a sandboxed process could use the TIOCSTI ioctl to
# inject keystrokes into unsandboxed same-user terminals. Kernel
# >= 6.2 disables TIOCSTI by default, making this safe. See
# ADMIN_HARDENING.md for kernel upgrade recommendations.
#
# Default: false (safe — no host /dev exposure, but tmux won't work
# on older kernels). Set to true if you need tmux/agent teams inside
# the sandbox and your kernel is < 5.4.
BIND_DEV_PTS=false


# ── Blocked Environment Variables ───────────────────────────────
#
# Environment variables REMOVED inside the sandbox. Any API tokens,
# passwords, or secrets in your shell environment should be listed
# here. The agent will see these as unset.
#
# Check what's in your environment:  env | grep -iE 'token|key|secret|pat|auth'

BLOCKED_ENV_VARS=(
    # API tokens & keys
    "GITHUB_PAT"
    "GITHUB_TOKEN"
    "GH_TOKEN"
    "OPENAI_API_KEY"
    "ANTHROPIC_API_KEY"
    "ZENODO_TOKEN"
    "HF_TOKEN"

    # Cloud & service credentials
    "AWS_ACCESS_KEY_ID"
    "AWS_SECRET_ACCESS_KEY"
    "AWS_SESSION_TOKEN"
    "ST_AUTH"
    "SW2_URL"

    # Personal / email
    "MUTT_EMAIL_ADDRESS"
    "MUTT_REALNAME"
    "MUTT_SMTP_URL"

    # Session / connection info
    "KRB5CCNAME"
    "SSH_CLIENT"
    "SSH_CONNECTION"
    "SSH_TTY"
    "DBUS_SESSION_BUS_ADDRESS"
    "OLDPWD"
    "TMUX"
    "TMUX_PANE"
)


# ── Allowed Credentials ────────────────────────────────────────
#
# Credentials to PASS THROUGH into the sandbox. These override the
# blocked list above. Use this when the agent needs specific access
# (e.g. AWS for S3 data, GitHub for pushing code).
#
# ⚠️  Only allow credentials the agent actually needs for the task.
#
# Example — allow AWS access:
# ALLOWED_CREDENTIALS=(
#     "AWS_ACCESS_KEY_ID"
#     "AWS_SECRET_ACCESS_KEY"
#     "AWS_DEFAULT_REGION"
#     "AWS_SESSION_TOKEN"
# )
#
# Example — allow GitHub CLI:
# ALLOWED_CREDENTIALS=(
#     "GITHUB_TOKEN"
#     "GH_TOKEN"
# )

ALLOWED_CREDENTIALS=()


# ── Passthrough Environment Variables ─────────────────────────
#
# ⚠️  NOTE: This array is currently UNUSED by all backends.
# The actual behavior is a blocklist model: every environment variable
# is inherited by the sandbox EXCEPT those in BLOCKED_ENV_VARS (above).
# PASSTHROUGH_ENV_VARS has no effect today. It is kept here for a
# potential future allowlist mode. Do not rely on it to control which
# variables reach the sandbox — use BLOCKED_ENV_VARS instead.
#
# Original intent (not yet implemented):
# Environment variables PASSED INTO the sandbox if set. These are
# needed for HPC tools (lmod, mamba), shell basics, and Homebrew
# to work correctly. Unlike ALLOWED_CREDENTIALS, these are not
# secrets — they're tool configuration.
#
# Variables listed here are only passed through if they are already
# set in your shell environment; missing ones are silently skipped.

PASSTHROUGH_ENV_VARS=(
    # HPC / lmod — infrastructure
    "BASH_ENV"
    "LMOD_CMD"
    "LMOD_DIR"
    "LMOD_PKG"
    "LMOD_ROOT"
    "LMOD_PACKAGE_PATH"
    "LMOD_VERSION"
    "LMOD_sys"
    "LMOD_COLORIZE"
    "MODULEPATH"
    "MODULEPATH_ROOT"
    "MODULESHOME"

    # lmod — loaded-module state (set by 'module load ...')
    "LOADEDMODULES"
    "_LMFILES_"
    "LD_LIBRARY_PATH"
    "LIBRARY_PATH"
    "CPATH"
    "PKG_CONFIG_PATH"
    "CMAKE_PREFIX_PATH"
    "PYTHONPATH"
    "R_LIBS_SITE"

    # Conda / Mamba
    "MAMBA_EXE"
    "MAMBA_ROOT_PREFIX"
    "CONDA_EXE"
    "CONDA_PREFIX"
    "CONDA_DEFAULT_ENV"
    "CONDA_SHLVL"
    "CONDA_PYTHON_EXE"
    "CONDA_PROMPT_MODIFIER"
    "_CE_CONDA"
    "_CE_M"

    # Shell basics
    "LANG"
    "LC_ALL"
    "SHELL"
    "USER"
    "LOGNAME"
    "EDITOR"
    "TERM"
    "MANPATH"
    "INFOPATH"

    # Homebrew
    "HOMEBREW_PREFIX"
    "HOMEBREW_CELLAR"
    "HOMEBREW_REPOSITORY"
)
