# ╔══════════════════════════════════════════════════════════════════╗
# ║  Sandbox Configuration                                           ║
# ║  ~/.config/agent-sandbox/sandbox.conf                            ║
# ║                                                                  ║
# ║  Edit this file to customize what sandboxed agents can see       ║
# ║  and do. Changes take effect the next time you start a sandbox.  ║
# ║                                                                  ║
# ║  REVIEW BEFORE FIRST USE — the main thing to configure is        ║
# ║  READONLY_MOUNTS below: add the data directories the agent       ║
# ║  needs to read. System paths are pre-configured.                 ║
# ╚══════════════════════════════════════════════════════════════════╝


# ── Read-Only Mounts ────────────────────────────────────────────
#
# Directories the agent can READ but never write to.
# System paths are required. Add your data directories at the bottom.
# The agent cannot access anything not listed here.

READONLY_MOUNTS=(
    # ── System (required — sandbox will warn if missing) ──
    "/usr"              # system binaries, shared libraries
    "/lib"              # core shared libraries (libc, ld-linux, etc.)
    "/lib64"            # 64-bit shared libraries (may not exist on all systems)
    "/bin"              # essential commands (bash, ls, cat, etc.)
    "/sbin"             # system binaries (ip, mount — some tools need these)
    "/etc"              # system config (resolv.conf, passwd, localtime, etc.)

    # ── HPC software stack ──
    "/app"              # lmod, modules, site-installed software

    # ── Your data (CUSTOMIZE THIS) ──
    # Examples (narrow → broad):
    #   "/fh/fast/mylab/user/me"            # just your user dir — recommended
    #   "/fh/fast/mylab"                    # entire lab — broad, use if needed
    # "/fh/fast/mylab/user/me"

    # HPC temp storage
    # "/hpc/temp/mylab"
)

# For per-project overrides (different mounts for different project dirs),
# create files in conf.d/*.conf. See conf.d/example.conf.


# ── Sandbox Backend ────────────────────────────────────────────
#
# Which isolation backend to use.
#
#   auto  — choose the best available backend (default)
#   bwrap — bubblewrap (recommended — mount namespace, paths hidden)
#
# Other backends (landlock, firejail) exist but bwrap provides the
# strongest isolation and is the primary supported backend.

SANDBOX_BACKEND="auto"

# ── Lmod / Environment Modules ─────────────────────────────────
#
# Modules to load before backend detection. Use this on HPC systems
# where sandbox dependencies (e.g., a newer bubblewrap) are only
# available via `module load`. Any module name accepted by lmod works.
# The sandbox will source lmod init from common locations if the
# `module` command isn't already available.
#
# SANDBOX_MODULES=("bubblewrap/0.11.1-GCCcore-12.3.0")


# ── User Enumeration Prevention ──────────────────────────────
#
# Filter /etc/passwd inside the sandbox to prevent LDAP/AD user
# enumeration. When true, generates a minimal /etc/passwd (system
# UIDs + current user) and overrides nsswitch.conf to use "files"
# only (no ldap/sss). getent passwd returns ~35 entries instead of
# thousands.
#
# Coverage:
#   bwrap    — overlays /etc/passwd + /etc/nsswitch.conf
#   firejail — blocks NSS daemon sockets (nscd, nslcd, sssd)
#   landlock — not supported (no mount namespace)
#
# Munge, Slurm, and normal user/group resolution are unaffected.
# Set to false if sandboxed processes need LDAP user lookups.
#
# Note (bwrap): `id` will show supplementary groups as "nogroup" (65534)
# regardless of this setting. This is a cosmetic limitation of bwrap's
# unprivileged user namespace (which can only map the caller's own
# UID/GID). File permissions still work correctly — the kernel uses
# host credentials for filesystem access.

FILTER_PASSWD=true


# ── Network Filter ────────────────────────────────────────────────
#
# Default-deny outbound network policy applied to the sandbox. Closes
# the local-MTA (Mail Transfer Agent — the daemon, e.g. Postfix or
# sendmail, that accepts mail for delivery) identity-hijack class and
# adjacent lateral-movement surface. Full rationale, per-backend
# support matrix, and the fallback semantics live in
# docs/reference/network-filter.md.
#
# Threat model recap. On most shared hosts the local Mail Transfer
# Agent (MTA — the daemon, e.g. Postfix or sendmail, that accepts
# mail for delivery) listens on `127.0.0.1:25` and accepts mail from
# any local user without authentication, then relays under the
# operator's identity. Postfix's `mynetworks` directive often also
# trusts a wider organizational CIDR (lab subnet, campus /16, etc.),
# so an adversary controlling a sandboxed agent can additionally
# speak SMTP directly to nearby relays without authentication. A
# binary-only block (overlay /dev/null over sendmail/mail/mailx/mutt)
# is defeated by any TCP-capable language; the network layer is the
# real fix.
#
# Mode (NETWORK_FILTER_MODE) — open | filtered | isolated:
#
#   open:     share the host network namespace; no isolation. Legacy
#             behaviour. Use only when the workload explicitly needs
#             host-equivalent network reach AND host-side mail policy
#             already covers identity-hijack.
#   filtered: new Linux network namespace (netns — a per-process
#             isolated network stack) + helper (pasta or
#             slirp4netns); applies the default-deny floor below plus
#             user/admin NETWORK_BLOCKLIST additions. The agent
#             retains general outbound TCP/UDP/DNS but loses the
#             threat-class ports. v1.0 ships the config surface but
#             the bwrap+pasta+nftables integration (nftables = the
#             Linux kernel packet-filter framework, successor to
#             iptables) is v1.1 work — until then, `filtered` falls
#             back per the policy below (default: to `isolated`,
#             loud warning).
#   isolated: new netns with no network at all. DNS / pip / git inside
#             the sandbox break; use for offline-only workloads or as
#             the strictest fallback target. Always works on bwrap and
#             firejail; on landlock the resolver fails per policy.
#
# Fallback policy (NETWORK_FILTER_FALLBACK) — strict | stricter | open:
#
#   strict:   the requested mode must be deliverable; sandbox refuses
#             to launch otherwise.
#   stricter: fall back ONLY to a more-restrictive mode if the requested
#             mode is unavailable. Falls back loudly. If no stricter
#             mode is possible (landlock has no netns), refuses to
#             launch with an explicit fix-path enumeration.
#   open:     fall back to ANY available mode, preferring stricter
#             first. Will silently degrade to host-network if no
#             isolated mode is available. Loud startup warning on any
#             fallback.
#
# Admin enforcement: an admin baseline can pin NETWORK_FILTER_MODE and
# NETWORK_FILTER_FALLBACK; user config can only request equal or
# stricter values. Admin NETWORK_BLOCKLIST entries become a floor that
# the user cannot remove (same model as BLOCKED_FILES).

NETWORK_FILTER_MODE="filtered"
NETWORK_FILTER_FALLBACK="stricter"

# Additional blocklist entries. Pattern syntax (one per entry):
#   "host"           — block all ports on this host/IP
#   "host:port"      — block specific port
#   "CIDR"           — block all ports on this CIDR range
#   "CIDR:port"      — block specific port on this range
#   "port"           — block this port outbound on every destination
#
# The built-in floor in sandbox-lib.sh::_NETWORK_BLOCKLIST_DEFAULTS
# already covers:
#   - local MTA submission (25/465/587/2525 on loopback)
#   - outbound to any external MTA on the canonical mail ports
#   - transactional-email HTTPS APIs (Mailgun, SendGrid, Postmark,
#     Resend, Amazon SES)
#   - webhook-as-mail surfaces (Slack/Discord/Teams/IFTTT)
#   - anonymous file-drop endpoints (transfer.sh, file.io, …)
#   - public paste services (pastebin.com, 0bin.net)
#   - DoH (DNS-over-HTTPS) resolvers — bypass DNS resolver pinning
# The defaults are always applied; this list extends them. Append
# entries here for site-specific surfaces not covered above.
NETWORK_BLOCKLIST=(
    # ── Site-specific extras (commented examples; uncomment + adapt) ──
    # Your organization may run additional internal mail relays whose
    # IPs are trusted by the local Postfix `mynetworks`. Block them
    # explicitly here to close the path of "submit directly to the
    # campus relay over plaintext SMTP". Use the CIDR range your IT
    # publishes for the mail-relay subnet.
    # "10.0.0.0/8:25"
    # "10.0.0.0/8:465"
    # "10.0.0.0/8:587"
    # "10.0.0.0/8:2525"

    # ── Optional DoT block (DNS-over-TLS, port 853) ──
    # The default floor blocks well-known DoH (DNS-over-HTTPS)
    # hostnames; DoT uses a fixed port and can be blocked by port.
    # "853"

    # ── Additional internal services your environment trusts by IP ──
    # E.g. a LDAP server, an internal Slack mirror, a self-hosted
    # webhook receiver. Pattern: "internal-service.example.org" or
    # "10.20.30.40:port".
)


# ── Writable Project Directory ──────────────────────────────────
#
# The sandbox gives the agent write access to exactly ONE directory
# (the "project dir", set via --project-dir or defaulting to $PWD).
#
# For safety, the project dir must be under one of these prefixes.
# Add paths here if your projects live elsewhere.
#
# When an admin baseline is present, the merge is **narrowing-only**:
# you can only RESTRICT the admin's allow-list, never expand it. An
# entry here is admissible iff its canonical path (via realpath) is
# identical to or a path-component subdir of one of admin's entries.
# Outside-of-admin entries are stripped with a warning at startup.
# Without an admin baseline, this list applies as-is.

ALLOWED_PROJECT_PARENTS=(
    "/fh/fast"
    "/fh/scratch"
    "/hpc/temp"
    "$HOME"
)


# ── Home Access Mode ──────────────────────────────────────────────
#
# Controls how much of $HOME the agent can see.
#
#   tmpwrite   — (default) tmpfs HOME with only listed paths visible.
#                The tmpfs is writable, so the agent can create files
#                anywhere in HOME (lock files, caches, temp dirs), but
#                they vanish on sandbox exit. Real HOME content is hidden.
#   restricted — like tmpwrite, but the tmpfs is read-only. Agents that
#                try to write to unlisted paths get "Read-only file system".
#   read       — full real HOME readable. ~/.ssh, ~/.aws, ~/.gnupg still
#                hidden. HOME_WRITABLE entries and project dir writable.
#   write      — full real HOME writable. ~/.ssh, ~/.aws, ~/.gnupg still
#                hidden. USE WITH CAUTION — agent can modify any dotfile.
#
# Can override via environment: HOME_ACCESS=read sandbox-exec.sh -- bash
# Or per-project in conf.d/*.conf.
HOME_ACCESS="tmpwrite"


# ── Home Directory Strategy ─────────────────────────────────────
#
# When HOME_ACCESS=tmpwrite or restricted (tmpwrite is the default),
# the sandbox BLANKS your entire $HOME with an empty tmpfs, then
# re-mounts only the entries listed below. Anything not listed is
# invisible to the agent — this is how credentials like ~/.ssh,
# ~/.aws, ~/.gnupg are blocked.
#
# When HOME_ACCESS=read or write, these lists are still used:
# HOME_WRITABLE entries get write access even in read mode.
#
# Both files and directories work here. Missing entries are silently
# skipped, so it's safe to list dotfiles you might not have.

# Subdirectories and files in $HOME to mount READ-ONLY.
# These give the agent access to your tools and shell config
# without exposing secrets.
HOME_READONLY=(
    # ── Shell config (needed for interactive shells inside sandbox) ──
    ".bashrc"               # bash startup — needed for shell inside sandbox
    ".bash_profile"         # bash login — needed for login shell init
    ".profile"              # sh/bash login — needed for POSIX shell init
    ".zshrc"                # zsh startup — needed if using zsh
    ".zprofile"             # zsh login — needed if using zsh
    ".inputrc"              # readline — needed for arrow keys, history, etc.

    # ── Git (needed for git operations inside sandbox) ──
    # NOTE: ~/.gitconfig is in HOME_SEEDED_FILES below (writable per-session
    # copy). If you want it strictly read-only, remove it from
    # HOME_SEEDED_FILES and uncomment it here.
    # ".gitconfig"

    # ── Editor config (optional — remove if agent doesn't use these) ──
    ".vimrc"                # vim config
    ".vim"                  # vim plugins / runtime
    ".tmux.conf"            # tmux config (only for nested tmux)
    ".dircolors"            # ls color scheme
    ".pythonrc"             # Python startup file

    # ── Tools & runtimes (needed for agent to run commands) ──
    ".linuxbrew"            # Homebrew — bwrap, node, git, etc. (required if installed via brew)
    ".local/bin"            # pip-installed CLI tools (claude, aider, opencode, etc.)
    ".local/share/pipx"     # pipx-installed tool virtualenvs (aider runtime) — not in defaults
    ".local/share/jupyter"  # Jupyter data dir (kernel specs, etc.)
    ".npm-global"           # npm global installs (gemini, codex CLI) — not in defaults
    "micromamba"            # micromamba environments (~/micromamba/)
    ".condarc"              # conda config — needed for conda/mamba commands
    ".mambarc"              # mamba config — needed for mamba commands
    # ".config/gh"          # uncomment to allow GitHub CLI access

    # ── Language toolchain caches (read-only; pre-install on host) ──
    # Same model as .linuxbrew / micromamba: the agent USES pre-installed
    # toolchains and existing cached deps. To let the agent EXTEND a
    # cache (e.g. `cargo build` fetching new crates, `npm install`
    # populating ~/.npm), promote the entry to HOME_WRITABLE instead.
    ".cargo"                # Rust crate registry + cargo bins (cargo, rustup-installed tools)
    ".rustup"               # Rust toolchains (rustc, std libs) — required for any Rust build
    ".npm"                  # npm package cache (downloaded tarballs) — distinct from .npm-global
    "go"                    # Go workspace (default $GOPATH=~/go; modules at go/pkg/mod, bins at go/bin)
    # ".gem"                # Ruby gem cache — uncomment if agent uses Ruby
    # ".gradle"             # Gradle build cache — uncomment for Java/Kotlin builds
    # ".m2"                 # Maven local repo — uncomment for Java/Maven builds
    # ".julia"              # Julia package depot — uncomment for Julia work
    # ".tox"                # Python tox environments — uncomment if using tox
    # ".pyenv"              # pyenv installs/shims — uncomment if using pyenv
    # ".bun"                # Bun package cache — uncomment if using Bun
    # ".yarn"               # Yarn package cache — uncomment if using Yarn
    # ".pnpm-store"         # pnpm package store — uncomment if using pnpm

    # Per-agent read-only entries (e.g. ".aider.conf.yml") are added
    # automatically by the agent profile mechanism — see ENABLED_AGENTS
    # below.
)

# Subdirectories and files of $HOME with WRITE access.
#
# Missing entries in $HOME are auto-created as empty dirs before the
# sandbox launches, so agents can do first-time setup/auth from inside
# the sandbox and have credentials persist across sessions.
#
# Per-agent state/credential entries (e.g. ".claude", ".codex",
# ".config/opencode") are added automatically from the enabled agent
# profiles — see ENABLED_AGENTS below.
HOME_WRITABLE=(
    ".cache"                # pip, uv, npm, and other tool caches
)


# ── Home Seeded Files ──────────────────────────────────────────
#
# Files whose CONTENT is read from the host but seeded into the
# per-session tmpfs $HOME as a writable copy. The agent can edit
# them without affecting the real host file — writes land in the
# tmpfs and are discarded on sandbox exit.
#
# Use this for dotfiles that tools want to write but you don't
# want the agent to mutate persistently:
#   - ~/.gitconfig (gh auth setup-git, IDE git plugins, git config --global)
#   - ~/.npmrc, ~/.yarnrc — package managers writing telemetry
#   - any config file that opt-ins via "write to your dotfile" CLI
#
# Conflict rule: an entry in HOME_SEEDED_FILES wins over the same
# entry in HOME_READONLY (the read-only mount is skipped).
#
# Backend support:
#   bwrap    — full support via --file FD DEST (writable tmpfs copy)
#   firejail — degrades to read-only (--whitelist + --read-only),
#              prints a warning at startup
#   landlock — degrades to read-only (--ro), prints a warning at
#              startup. No mount namespace = no per-session copy.
#
# Default: ~/.gitconfig (so gh/IDE git operations work out of the box).
# Add or remove entries as you wish.
HOME_SEEDED_FILES=(
    ".gitconfig"
)


# ── Enabled Agent Profiles ─────────────────────────────────────
#
# For each name listed here, the corresponding agents/<name>/config.conf
# contributes:
#   - Writable paths (e.g. ~/.claude, ~/.codex) folded into HOME_WRITABLE
#   - Read-only paths folded into HOME_READONLY
#   - Files to hide (real AGENTS.md / CLAUDE.md) folded into BLOCKED_FILES
# and the agent's overlay.sh runs to merge sandbox-integrity instructions
# into a sandbox-config dir, exposed to the agent via *_CONFIG_DIR.
#
# Disabled agents contribute nothing — their config dirs stay invisible
# inside the sandbox. Enable only the agents you actually use, so e.g.
# ~/.pi (which could be unrelated user data) doesn't become writable
# for users who don't run the pi agent.
#
# Adding support for a new tool: drop in agents/<name>/{config.conf,
# overlay.sh,agent.md}, then add "<name>" to this list. See
# agents/claude/config.conf for the schema.
#
# Default-enabled: claude, codex, gemini.
#
# Opt-in (uncomment to enable):
#   ENABLED_AGENTS+=("aider")     # Aider — env-var auth (no extra writable paths)
#   ENABLED_AGENTS+=("opencode")  # OpenCode — needs ~/.config/opencode + ~/.local/share/opencode + ~/.cache/opencode + ~/.local/state/opencode writable
#   ENABLED_AGENTS+=("pi")        # pi-mono — needs ~/.pi writable
ENABLED_AGENTS=("claude" "codex" "gemini")


# ── Blocked Files ───────────────────────────────────────────────
#
# Specific files inside readable or writable directories that should
# be hidden from the agent. These files are overlaid with /dev/null —
# they appear to exist but are empty. Useful when a parent directory
# must be accessible but a specific file within it should be protected.
#
# Backend limitation: only respected by the bwrap and firejail
# backends. Landlock cannot block individual files under directories
# it has already granted access to.
#
# Per-agent instruction-file blocks (e.g. ~/.claude/CLAUDE.md) are
# added automatically from the enabled agent profiles — see
# ENABLED_AGENTS above.
#
BLOCKED_FILES=()


# ── Additional Blocked Paths ────────────────────────────────────
#
# Paths OUTSIDE $HOME that should be hidden. These are overlaid
# with an empty tmpfs. Use this to block sensitive data directories
# (e.g. clinical data, restricted datasets) that would otherwise
# be visible under a read-only mount.
#
# Example: Block a clinical data subdirectory that's under /fh/fast:
# EXTRA_BLOCKED_PATHS=(
#     "/fh/fast/setty_m/restricted_clinical_data"
# )

EXTRA_BLOCKED_PATHS=()


# ── Additional Writable Directories ──────────────────────────
#
# Directories the agent can READ AND WRITE in addition to the
# project directory. Use this for shared output directories,
# pipeline scratch space, or other locations the agent needs to
# modify that aren't the project dir.
#
# Each path expands the agent's write surface. Only add
# directories the agent genuinely needs to write to.
#
# Example:
# EXTRA_WRITABLE_PATHS=(
#     "/fh/scratch/delete30/mylab/agent-output"
# )

EXTRA_WRITABLE_PATHS=()


# ── Device Passthrough (bwrap only) ──────────────────────────────
#
# Each entry in DEVICES is bind-mounted into the sandbox via
# `bwrap --dev-bind PATH PATH` after bwrap's minimal devtmpfs is set
# up. Glob patterns are expanded against the host /dev at sandbox
# spawn time — entries that match nothing drop silently, so the
# NVIDIA defaults are a safe no-op on CPU-only nodes.
#
# Defaults expose only NVIDIA driver nodes — the recurring HPC use
# case. Add /dev/snd, /dev/dri/*, /dev/kvm, /dev/fuse, /dev/uinput,
# etc. as your workload requires.
#
# DEVICES_BLACKLIST (set in the admin sandbox.conf when an admin
# install is present, otherwise the safe defaults in sandbox-lib.sh)
# vetoes any resolved path matching its globs. Notably /dev/pts is
# blacklisted by default to close the TIOCSTI keystroke-injection
# hole on kernel < 6.2 — see docs/admin/hardening.md and
# docs/reference/device-passthrough.md.
#
# Reset vs append:
#   DEVICES=(/dev/something)   — replace defaults with this list
#   DEVICES+=(/dev/something)  — append to the defaults
DEVICES=(
    /dev/nvidia*
    /dev/nvidia-uvm
    /dev/nvidia-uvm-tools
    /dev/nvidia-modeset
    /dev/nvidiactl
)


# ── BIND_DEV_PTS (DEPRECATED) ────────────────────────────────────
#
# Historical knob: when true, bound the entire host /dev into the
# sandbox. Replaced by the DEVICES list above. For backward compat,
# BIND_DEV_PTS=true is shimmed at config-load time:
#
#   * on kernel < 5.4 it appends /dev/pts to DEVICES (the historical
#     behaviour — tmux needs the host devpts because bwrap's user-ns
#     devpts on those kernels reports ptmxmode=000);
#
#   * on kernel >= 5.4 it is a logged no-op. bwrap auto-mounts a
#     working user-ns devpts on those kernels, and binding the host
#     /dev/pts on top would shadow it with ptmxmode=000 and silently
#     break pty allocation (tmux exits with "create session failed";
#     script(1) with "Permission denied"). DO NOT add /dev/pts to
#     DEVICES on kernel >= 5.4 either — the same shadowing trap
#     applies and we will warn but not block.
#
# Migration: drop this line. On kernel >= 5.4 you do not need it;
# on kernel < 5.4 (cf. Fred Hutch gizmo's 5.4.0-228) bwrap's
# auto-devpts is fine for pty. Only add `DEVICES+=(/dev/pts)` if you
# are on a pre-5.4 kernel AND tmux fails inside the sandbox without
# it; expect the TIOCSTI security caveat (kernel < 6.2) in return.
BIND_DEV_PTS=false


# ── Blocked Environment Variables ───────────────────────────────
#
# The sandbox blocks env vars via TWO mechanisms (both overridable
# by ALLOWED_ENV_VARS below):
#
#   1. BLOCKED_ENV_VARS — explicit var names (below)
#   2. BLOCKED_ENV_PATTERNS — glob patterns (further below)
#
# At startup (unless SANDBOX_QUIET=true), the sandbox prints how many
# env vars were blocked by pattern so you can diagnose missing vars.
#
# To let a specific variable through:  add it to ALLOWED_ENV_VARS below.
# To block an additional variable:     add it to BLOCKED_ENV_VARS.
# To add a blocking pattern:           add it to BLOCKED_ENV_PATTERNS.
#
# Agent profiles can also unblock vars via agents/<name>/config.conf.
#
# Check what's in your environment:  env | grep -iE 'token|key|secret|pat|auth'
#
# Note: LD_PRELOAD and LD_LIBRARY_PATH are intentionally NOT blocked.
# Conda environments, CUDA, Intel MKL, and other HPC tools rely on them.
# The agent already has code execution, so these don't add attack surface.

BLOCKED_ENV_VARS=(
    # Specific names NOT caught by BLOCKED_ENV_PATTERNS globs.
    # Names like GITHUB_TOKEN, HF_TOKEN, OPENAI_API_KEY, AWS_*, AZURE_*,
    # SSH_*, etc. are already matched by patterns — no need to list them here.

    # API tokens & keys (no pattern-matching suffix)
    "GITHUB_PAT"

    # Cloud & service credentials
    "ST_AUTH"
    "SW2_URL"

    # Database credentials
    "DATABASE_URL"
    "PGPASSWORD"                 # no *_PASSWORD suffix (different convention)
    "MYSQL_PWD"
    "MONGO_URI"
    "REDIS_URL"

    # Google service account (path, not a token)
    "GOOGLE_APPLICATION_CREDENTIALS"

    # Personal / email
    "MUTT_EMAIL_ADDRESS"
    "MUTT_REALNAME"
    "MUTT_SMTP_URL"

    # Session / system info
    "KRB5CCNAME"
    "DBUS_SESSION_BUS_ADDRESS"
    "OLDPWD"
    "TMUX"
    "TMUX_PANE"
    "SLURM_CONF"
    "SLURM_CONFIG_DIR"
)


# ── Blocked Environment Patterns (glob-based) ──────────────────
#
# Glob patterns that block any matching env var. Use ALLOWED_ENV_VARS
# to exempt a specific variable matched by these patterns.
#
# Example: "*_TOKEN" blocks MY_APP_TOKEN, DEPLOY_TOKEN, etc.
#          "CI_*" blocks CI_BUILD_ID, CI_PIPELINE_URL, etc.
#
# Cloud-provider prefix wildcards (AWS_*, AMAZON_*, EC2_*, MSAL_*,
# VAULT_*) follow bindsch/scode (scode:113-158) — see
# https://github.com/bindsch/scode.  A single prefix sweeps the long
# tail of provider env vars (AWS_SECRET_ACCESS_KEY, AWS_PROFILE,
# AWS_DEFAULT_REGION, MSAL_CACHE_PATH, VAULT_ADDR, …) without
# per-key opt-in.  If a benign variable in this space is needed inside
# the sandbox (e.g. AWS_DEFAULT_REGION for region-aware tools), add it
# to ALLOWED_ENV_VARS below.

BLOCKED_ENV_PATTERNS=(
    "SSH_*"
    "*_TOKEN"  "*_SECRET"  "*_PASSWORD"  "*_CREDENTIAL"
    "*_API_KEY"  "*_SECRET_KEY"  "*_PRIVATE_KEY"
    # AWS / Amazon (scode:117)
    "AWS_*"  "AMAZON_*"  "EC2_*"
    # Azure / Microsoft auth library
    "AZURE_*"  "MSAL_*"
    # Google Cloud Platform
    "GCP_*"  "GCLOUD_*"  "GOOGLE_CLOUD_*"
    # HashiCorp Vault (VAULT_TOKEN already caught by *_TOKEN; the
    # prefix also blocks VAULT_ADDR / VAULT_NAMESPACE topology)
    "VAULT_*"
    "DOCKER_*"  "REGISTRY_*"
    "CI_*"  "GITLAB_*"  "JENKINS_*"  "BUILDKITE_*"  "CIRCLECI_*"
)


# ── Allowed Environment Variables (overrides) ─────────────────
#
# Variables listed here are NEVER blocked, even if they appear in
# BLOCKED_ENV_VARS or match BLOCKED_ENV_PATTERNS above.
# Use this to let specific variables through.
#
# The agent-API-key defaults below are enabled so agents work on
# first launch. Comment out any line to block that variable
# instead. Agents that don't need env-var auth (e.g., Claude Code
# uses OAuth) simply ignore the variable.

ALLOWED_ENV_VARS=(
    "ANTHROPIC_API_KEY"      # Claude Code (env-var fallback), Aider, OpenCode
    "OPENAI_API_KEY"         # Codex CLI, Aider, OpenCode
    "CODEX_API_KEY"          # Codex CLI (alternative to OPENAI_API_KEY)
    "GOOGLE_API_KEY"         # Gemini CLI
)


# ── Agent Warning Suppression ────────────────────────────────────
#
# At startup, the sandbox checks each agent profile in agents/*/
# and warns if the agent's declared credentials/paths (see its
# config.conf) look unreachable — missing env vars AND no writable
# auth directory. Useful when an agent's first-time auth needs
# setup, but noisy if you intentionally isolate an agent (e.g.,
# removed ~/.claude from HOME_WRITABLE to force fresh login each
# session).
#
# Add agent names to silence their warnings. Use "all" to silence
# every agent. Examples:
#   SUPPRESS_AGENT_WARNINGS=("claude")       # silence just Claude
#   SUPPRESS_AGENT_WARNINGS=("all")          # silence every agent
SUPPRESS_AGENT_WARNINGS=()


# ── Process Limit (fork bomb defense) ──────────────────────────
#
# Set to a number to cap the total processes the sandbox user can run.
# This is defense-in-depth — admin cgroups with pids.max are the primary
# protection. Without cgroups, a fork bomb inside the sandbox fills the
# per-UID RLIMIT_NPROC, potentially killing the user's OTHER processes
# (shells, editors) outside the sandbox.
#
# Note: RLIMIT_NPROC counts per-UID system-wide, not per-sandbox.
# Empty = no limit (default).
# SANDBOX_NPROC_LIMIT="4096"


# ── Chaperon (Slurm Proxy) ───────────────────────────────────────
#
# The chaperon proxies sbatch, srun, scancel, squeue, scontrol, sacct,
# and sacctmgr from inside the sandbox. See docs/reference/chaperon.md for details.

# Slurm job scope: controls which jobs scancel/squeue/scontrol can see and manage.
#   "project"  — jobs from any sandbox session with the same project dir (default)
#   "session"  — only jobs submitted by THIS sandbox session
#   "user"     — all jobs of the current user (including non-sandbox jobs)
#   "none"     — no scope restriction (full access to your own jobs)
SLURM_SCOPE="project"

# Chaperon log level: debug, info, warn, error.
# Logs are written to ~/.local/state/agent-sandbox/chaperon/ (one file per session).
# Each log file is named <hostname>_<PID>_<timestamp>.log for uniqueness across
# multiple concurrent sandboxes and NFS-shared home directories.
#   "debug"  — all requests, handler exit codes, protocol details
#   "info"   — (default) startup, shutdown, each request, non-zero exits
#   "warn"   — timeouts, validation failures, non-zero handler exits
#   "error"  — only security rejections and hard failures
CHAPERON_LOG_LEVEL="info"

# How many days to retain chaperon log files. Older logs are pruned at
# each chaperon startup. A total size cap of 50 MiB is also enforced.
CHAPERON_LOG_RETAIN_DAYS=7
