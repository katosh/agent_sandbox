# sandbox-tmux.conf — tmux config for nested sessions inside the sandbox
#
# Minimal config for tmux inside the sandbox.
# Installed to ~/.config/agent-sandbox/sandbox-tmux.conf and referenced via
# the bin/tmux wrapper.
#
# Uncomment to source your ~/.tmux.conf. This may cause "lost server"
# if your config uses run-shell plugins or status scripts that
# reference paths hidden by the sandbox (e.g. ~/gits/, /run/user/).
# source-file ~/.tmux.conf

# Ctrl-a prefix for nesting (outer tmux uses Ctrl-b)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Terminal
set -g default-terminal "tmux-256color"
set -asg terminal-overrides ",xterm-256color:Tc"
set -sg escape-time 10

# ── Claude Code compatibility ──────────────────────────────────────
# https://code.claude.com/docs/en/terminal-config — settings Claude Code
# (and other modern full-screen TUIs) need to render correctly inside a
# nested tmux. Guarded with %if so old tmux (the sandbox supports back to
# ~2.6) skips the newer option names instead of erroring on them. The
# version compare is numeric on the major.minor float, fine for 3.x.
%if "#{>=:#{version},3.3}"
    # Let Claude Code's desktop-notification + progress-bar escape
    # sequences pass through tmux to the outer terminal instead of being
    # swallowed. Without this, notifications/progress never appear — the
    # most common "Claude Code looks broken inside tmux" symptom.
    set -g allow-passthrough on
    # Extended keys: forward Shift+Enter (insert newline in the prompt)
    # distinctly from plain Enter (submit), so multiline input works.
    set -s extended-keys on
    set -as terminal-features "xterm*:extkeys"
    # Advertise 24-bit colour for every outer terminal (not just
    # xterm-256color, which the terminal-overrides line above covers on
    # pre-3.2 tmux) so Claude Code's theme renders in true colour
    # regardless of the host terminal emulator.
    set -as terminal-features ",*:RGB"
    # Allow apps inside tmux to set the system clipboard via OSC 52 —
    # Claude Code's copy path when running over SSH / inside tmux.
    set -g set-clipboard on
%endif

# Status bar
set -g status-left "[sandbox] "
set -g status-right "%H:%M"
set -g status-interval 5
set-option -g status-style fg=yellow,bg=black

# Basics
set-option -g history-limit 100000
# Mouse on: wheel-scroll + click-to-expand in Claude Code's full-screen
# tool output. Trade-off: hold Shift to select/copy text natively. Set to
# off here if you prefer terminal-native selection (keyboard PgUp/PgDn
# scrolling still works either way).
set-option -g mouse on
set -g base-index 1
setw -g pane-base-index 1

# Use current path in new panes/windows
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
