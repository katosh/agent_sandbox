# sandbox-tmux.conf — tmux config for nested sessions inside the sandbox
#
# Sources the user's ~/.tmux.conf first, then overrides settings that
# won't work inside the sandbox (prefix key, status bar scripts that
# reference paths like /run/user/ which are hidden by /run isolation).
#
# Installed to ~/.claude/sandbox/sandbox-tmux.conf and referenced via
# the bin/tmux wrapper.

# Source user's config first (ignore errors if missing)
if-shell "test -f ~/.tmux.conf" "source-file ~/.tmux.conf"

# Override prefix for nesting (must come after user config)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Reset status bar — user scripts may reference paths unavailable in
# the sandbox (e.g. /run/user/$UID, host-specific interfaces).
set -g status-left "[sandbox] "
set -g status-right "%H:%M"
