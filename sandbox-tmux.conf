# sandbox-tmux.conf — tmux config for nested sessions inside the sandbox
#
# Sources the user's ~/.tmux.conf first, then overrides the prefix to
# Ctrl-a so inner and outer tmux sessions have distinct keybindings.
#
# Installed to ~/.claude/sandbox/sandbox-tmux.conf and referenced via
# the TMUX_CONF alias set up in sandbox-lib.sh.

# Source user's config first (ignore errors if missing)
if-shell "test -f ~/.tmux.conf" "source-file ~/.tmux.conf"

# Override prefix for nesting (must come after user config)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Visual indicator to distinguish from outer session
set -g status-left "[sandbox] "
