# Admin Security Baseline
#
# This config sets the security floor. Users can ADD to these arrays
# (via ~/.config/agent-sandbox/user.conf or conf.d/) but CANNOT remove
# entries set here. Everything not listed here uses defaults from
# sandbox-lib.sh — users control the rest.
#
# See docs/admin/install.md for the full enforcement model.

# ── Paths where agents may NOT write (user EXTRA_WRITABLE_PATHS
#    entries under these are stripped with a warning) ──
DENIED_WRITABLE_PATHS=(
    "/etc"
    "/app"
    "$HOME/.ssh"
    "$HOME/.gnupg"
)

# ── Where agents may work (project dirs must be under one of these) ──
#
# Narrowing-only: users can only RESTRICT this list, never expand it.
# A user-supplied entry is admissible iff its canonical path (via
# realpath, with all symlinks followed) is identical to or a
# path-component subdir of one of these entries. Paths outside this
# tree are stripped with a warning. If every user-requested entry is
# rejected, the sandbox refuses to start.
#
# If you remove this assignment entirely, the narrowing baseline
# defaults to "/" (no narrowing — the user's list passes through). If
# you set it to a malformed value (non-array, non-absolute paths, or
# command substitution), the sandbox refuses to start instead of
# falling through to a permissive default.
ALLOWED_PROJECT_PARENTS=(
    "$HOME"
    # "/fh/fast"
    # "/fh/scratch"
)

# ── Environment variables to block (in addition to built-in defaults) ──
# Names like *_TOKEN, *_SECRET, SSH_* are already blocked by
# BLOCKED_ENV_PATTERNS in sandbox-lib.sh defaults.
BLOCKED_ENV_VARS=(
    # "GITHUB_PAT"
)

# ── Files to hide inside readable/writable directories ──
# (bwrap/firejail only — no effect on Landlock)
BLOCKED_FILES=(
    # "$HOME/.claude/settings.json"
)

# ── Sensitive directories under READONLY_MOUNTS to hide entirely ──
EXTRA_BLOCKED_PATHS=(
    # "/fh/fast/mylab/clinical_restricted"
)

# ── Devices that must NOT be bind-mounted into the sandbox ──
# Admin-enforced: users can ADD blacklist entries via their conf.d/
# overlays but cannot REMOVE entries set here. Each entry is a glob,
# matched case-style against every resolved DEVICES path.
#
# Defaults in sandbox-lib.sh already block /dev/mem, /dev/kmem,
# /dev/port, /dev/pts (TIOCSTI on kernel < 6.2), /dev/sd*, /dev/nvme*,
# /dev/loop*. Use this list to extend cluster-specific bans.
DEVICES_BLACKLIST=(
    # "/dev/dri/*"           # block DRM render nodes
    # "/dev/snd/*"           # block ALSA devices on shared nodes
    # "/dev/kvm"             # block KVM passthrough
)

# ── Mail-block layer (defense-in-depth above the network filter) ──
# Replaces canonical mailer binaries inside the sandbox with stubs
# that print a deterrent message and exit 77. Admin pin is
# non-weakening: user can request equal or stricter; off < auto < on.
# Leave commented to defer to the user's choice (defaults to "auto").
# NETWORK_MAIL_BLOCK="on"

# ── Default home access mode ──
# Users can override at launch: HOME_ACCESS=tmpwrite agent-sandbox ...
# HOME_ACCESS="restricted"

# ── Slurm job scope ──
# SLURM_SCOPE="project"
