# OpenCode — sandbox config
# Sourced by _apply_agent_profiles() when opencode is detected.

# Home paths
AGENT_HOME_WRITABLE=(".config/opencode")
AGENT_HOME_READONLY=()

# Hide real AGENTS.md (agent sees merged copy via OPENCODE_CONFIG_DIR)
AGENT_HIDE_FILES=("\$HOME/.config/opencode/AGENTS.md")

# OpenCode needs API keys from the environment
AGENT_UNBLOCK_ENV_VARS=("OPENAI_API_KEY" "ANTHROPIC_API_KEY")
