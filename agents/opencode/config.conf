# OpenCode — agent metadata (declarative)
#
# When this agent is listed in ENABLED_AGENTS (sandbox.conf), the paths
# and blocked files below are folded into HOME_WRITABLE / HOME_READONLY
# / BLOCKED_FILES automatically. See agents/claude/config.conf for the
# full schema description.

AGENT_CREDENTIAL_ENV_VARS=("OPENAI_API_KEY" "ANTHROPIC_API_KEY")

# Auth file moved from ~/.config/opencode/ to ~/.local/share/opencode/
# in newer releases (XDG data dir).
AGENT_AUTH_MARKERS=(
    "$HOME/.local/share/opencode/auth.json"
    "$HOME/.config/opencode/auth.json"
)

# OpenCode uses XDG dirs and mkdir's all four on startup. All must be
# writable or the agent fails to launch.
AGENT_REQUIRED_WRITABLE_PATHS=(
    "$HOME/.config/opencode"
    "$HOME/.local/share/opencode"
    "$HOME/.cache/opencode"
    "$HOME/.local/state/opencode"
)
AGENT_REQUIRED_READABLE_PATHS=()

AGENT_BLOCKED_FILES=(
    "$HOME/.config/opencode/AGENTS.md"
)

AGENT_LOGIN_HINT="run 'opencode' inside the sandbox — it will prompt for provider credentials on first run, or export OPENAI_API_KEY / ANTHROPIC_API_KEY and keep them enabled in ALLOWED_ENV_VARS."
