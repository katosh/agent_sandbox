# Codex CLI — agent metadata (declarative, read-only)
#
# This file DECLARES what Codex needs. It does NOT modify sandbox
# permissions — those live in the sandbox configuration (sandbox.conf
# and any admin / conf.d overrides). Sourced by
# _check_agent_requirements() for credential/path warnings.

AGENT_CREDENTIAL_ENV_VARS=("OPENAI_API_KEY" "CODEX_API_KEY")

AGENT_AUTH_MARKERS=(
    "$HOME/.codex/auth.json"
)

AGENT_REQUIRED_WRITABLE_PATHS=("$HOME/.codex")
AGENT_REQUIRED_READABLE_PATHS=()

AGENT_LOGIN_HINT="run 'codex login' inside the sandbox, or export OPENAI_API_KEY and add it to ALLOWED_ENV_VARS in sandbox.conf."
