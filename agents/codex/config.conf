# Codex CLI — sandbox config
# Sourced by _apply_agent_profiles() when codex is detected.

# Home paths
AGENT_HOME_WRITABLE=(".codex")
AGENT_HOME_READONLY=()

# Hide real AGENTS.md (agent sees merged copy via CODEX_HOME)
AGENT_HIDE_FILES=("\$HOME/.codex/AGENTS.md")

# Codex needs API keys from the environment
AGENT_UNBLOCK_ENV_VARS=("OPENAI_API_KEY" "CODEX_API_KEY")
