# Codex CLI — agent metadata (declarative)
#
# When this agent is listed in ENABLED_AGENTS (sandbox.conf), the paths
# and blocked files below are folded into HOME_WRITABLE / HOME_READONLY
# / BLOCKED_FILES automatically. See agents/claude/config.conf for the
# full schema description.

AGENT_CREDENTIAL_ENV_VARS=("OPENAI_API_KEY" "CODEX_API_KEY")

AGENT_AUTH_MARKERS=(
    "$HOME/.codex/auth.json"
)

AGENT_REQUIRED_WRITABLE_PATHS=("$HOME/.codex")
AGENT_REQUIRED_READABLE_PATHS=()

AGENT_BLOCKED_FILES=(
    "$HOME/.codex/AGENTS.md"
)

AGENT_LOGIN_HINT="run 'codex login' inside the sandbox, or export OPENAI_API_KEY and add it to ALLOWED_ENV_VARS in sandbox.conf."
