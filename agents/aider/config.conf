# Aider — sandbox config
# Sourced by _apply_agent_profiles() when aider is detected.

# Home paths (config is read-only, no state directory)
AGENT_HOME_WRITABLE=()
AGENT_HOME_READONLY=(".aider.conf.yml")

# No files to hide
AGENT_HIDE_FILES=()

# Aider uses API keys from the environment
AGENT_UNBLOCK_ENV_VARS=("OPENAI_API_KEY" "ANTHROPIC_API_KEY")
