# Aider — agent metadata (declarative)
#
# When this agent is listed in ENABLED_AGENTS (sandbox.conf), the paths
# below are folded into HOME_WRITABLE / HOME_READONLY automatically.
# See agents/claude/config.conf for the full schema description.

# Aider auths purely via env var — no persistent OAuth flow.
AGENT_CREDENTIAL_ENV_VARS=("OPENAI_API_KEY" "ANTHROPIC_API_KEY")

# Aider has no persistent auth file; missing env var is the only signal.
AGENT_AUTH_MARKERS=()

# Aider has no writable state dir of its own.
AGENT_REQUIRED_WRITABLE_PATHS=()
AGENT_REQUIRED_READABLE_PATHS=("$HOME/.aider.conf.yml")

AGENT_BLOCKED_FILES=()

AGENT_LOGIN_HINT="export OPENAI_API_KEY or ANTHROPIC_API_KEY before launching the sandbox, and keep the variable enabled in ALLOWED_ENV_VARS in sandbox.conf."
