# Home directory paths for Claude Code
# These are added to HOME_WRITABLE and HOME_READONLY automatically
# when the claude agent profile is detected.

AGENT_HOME_WRITABLE=(
    ".claude"
    ".claude.json"
    ".local/state/claude"
    ".local/share/claude"
)

AGENT_HOME_READONLY=(
    # .cache/claude and .cache/claude-cli-nodejs are under .cache which
    # is already in HOME_WRITABLE — no need to list them separately.
)
