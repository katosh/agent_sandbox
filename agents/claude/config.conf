# Claude Code — agent metadata (declarative, read-only)
#
# This file is a DECLARATION of what Claude Code needs. It does NOT
# modify sandbox permissions. All permission grants (HOME_WRITABLE,
# HOME_READONLY, BLOCKED_FILES, ALLOWED_ENV_VARS) live in the sandbox
# configuration layer (sandbox.conf — user and admin — plus per-project
# conf.d/*.conf).
#
# Sourced by _check_agent_requirements() in sandbox-lib.sh to decide
# whether to warn about missing credentials or unreachable paths.

# Env vars Claude can use to authenticate. Claude primarily uses OAuth
# (tokens stored under ~/.claude), so the env var is a fallback.
AGENT_CREDENTIAL_ENV_VARS=("ANTHROPIC_API_KEY")

# Files/dirs inside the user's config dir that indicate the agent has
# already authenticated. Warnings are suppressed if any of these exist.
AGENT_AUTH_MARKERS=(
    "$HOME/.claude/.credentials.json"
    "$HOME/.claude.json"
)

# Writable paths Claude needs under $HOME. Listed for warning purposes
# only — actual write access comes from HOME_WRITABLE in sandbox.conf.
AGENT_REQUIRED_WRITABLE_PATHS=("$HOME/.claude")

AGENT_REQUIRED_READABLE_PATHS=()

# One-line hint shown if credentials are missing.
AGENT_LOGIN_HINT="run 'claude' inside the sandbox — it will prompt for OAuth login on first run."
