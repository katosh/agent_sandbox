# Claude Code — sandbox config
# Sourced by _apply_agent_profiles() when claude is detected.

# Home paths
AGENT_HOME_WRITABLE=(".claude" ".claude.json" ".local/state/claude" ".local/share/claude")
AGENT_HOME_READONLY=()

# Files to hide (overlay with /dev/null).
# The real CLAUDE.md is hidden so the agent only sees the merged
# sandbox-config copy (via CLAUDE_CONFIG_DIR).
AGENT_HIDE_FILES=("\$HOME/.claude/CLAUDE.md")

# Env vars to unblock (Claude uses OAuth, not env vars for auth)
AGENT_UNBLOCK_ENV_VARS=()
