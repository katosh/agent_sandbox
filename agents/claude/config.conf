# Claude Code — agent metadata (declarative)
#
# This file DECLARES what Claude Code needs. When this agent is listed
# in ENABLED_AGENTS (sandbox.conf), the paths and blocked files below
# are folded into HOME_WRITABLE / HOME_READONLY / BLOCKED_FILES
# automatically by sandbox-lib.sh. When the agent is NOT enabled,
# these declarations have no effect — the agent's config dir stays
# inaccessible inside the sandbox.
#
# Schema fields:
#   AGENT_CREDENTIAL_ENV_VARS      env vars the agent uses for auth
#   AGENT_AUTH_MARKERS             files whose existence = authenticated
#   AGENT_REQUIRED_WRITABLE_PATHS  paths granted write access when enabled
#   AGENT_REQUIRED_READABLE_PATHS  paths granted read access when enabled
#   AGENT_BLOCKED_FILES            files overlaid with /dev/null when enabled
#                                  (typically the real AGENTS.md/CLAUDE.md
#                                  so the sandbox-merged copy wins)
#   AGENT_LOGIN_HINT               one-line hint shown when creds look blocked

# Claude primarily uses OAuth (tokens stored under ~/.claude); env var is fallback.
AGENT_CREDENTIAL_ENV_VARS=("ANTHROPIC_API_KEY")

AGENT_AUTH_MARKERS=(
    "$HOME/.claude/.credentials.json"
    "$HOME/.claude.json"
)

AGENT_REQUIRED_WRITABLE_PATHS=(
    "$HOME/.claude"
    "$HOME/.claude.json"
    "$HOME/.local/state/claude"
    "$HOME/.local/share/claude"
)

AGENT_REQUIRED_READABLE_PATHS=()

AGENT_BLOCKED_FILES=(
    "$HOME/.claude/CLAUDE.md"
)

AGENT_LOGIN_HINT="run 'claude' inside the sandbox — it will prompt for OAuth login on first run."
