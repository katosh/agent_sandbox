# Gemini CLI — sandbox config
# Sourced by _apply_agent_profiles() when gemini is detected.

# Home paths
AGENT_HOME_WRITABLE=(".gemini")
AGENT_HOME_READONLY=()

# Hide real GEMINI.md (agent sees merged copy via GEMINI_CONFIG_DIR)
AGENT_HIDE_FILES=("\$HOME/.gemini/GEMINI.md")

# Gemini needs API key from the environment
AGENT_UNBLOCK_ENV_VARS=("GOOGLE_API_KEY")
