# Gemini CLI — agent metadata (declarative)
#
# When this agent is listed in ENABLED_AGENTS (sandbox.conf), the paths
# and blocked files below are folded into HOME_WRITABLE / HOME_READONLY
# / BLOCKED_FILES automatically. See agents/claude/config.conf for the
# full schema description.

AGENT_CREDENTIAL_ENV_VARS=("GOOGLE_API_KEY")

AGENT_AUTH_MARKERS=(
    "$HOME/.gemini/oauth_creds.json"
)

AGENT_REQUIRED_WRITABLE_PATHS=("$HOME/.gemini")
AGENT_REQUIRED_READABLE_PATHS=()

AGENT_BLOCKED_FILES=(
    "$HOME/.gemini/GEMINI.md"
)

AGENT_LOGIN_HINT="run 'gemini' inside the sandbox — it will prompt for Google OAuth on first run. Or export GOOGLE_API_KEY and add it to ALLOWED_ENV_VARS in sandbox.conf."
