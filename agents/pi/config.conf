# pi (pi-mono coding agent) — agent metadata (declarative)
#
# When this agent is listed in ENABLED_AGENTS (sandbox.conf), the paths
# and blocked files below are folded into HOME_WRITABLE / HOME_READONLY
# / BLOCKED_FILES automatically. See agents/claude/config.conf for the
# full schema description.
#
# pi (https://github.com/badlogic/pi-mono) is shipped DISABLED by default.
# Add "pi" to ENABLED_AGENTS in sandbox.conf to enable it; until then,
# nothing under ~/.pi is writable inside the sandbox (so the directory
# name doesn't claim user data the user may have intended for something
# else).

AGENT_CREDENTIAL_ENV_VARS=("ANTHROPIC_API_KEY" "OPENAI_API_KEY" "GEMINI_API_KEY" "GROQ_API_KEY" "XAI_API_KEY" "MISTRAL_API_KEY" "OPENROUTER_API_KEY")

AGENT_AUTH_MARKERS=(
    "$HOME/.pi/agent/auth.json"
)

AGENT_REQUIRED_WRITABLE_PATHS=("$HOME/.pi")
AGENT_REQUIRED_READABLE_PATHS=()

AGENT_BLOCKED_FILES=(
    "$HOME/.pi/agent/AGENTS.md"
)

AGENT_LOGIN_HINT="run 'pi' inside the sandbox and use '/login' to authenticate, or export an API key (e.g. ANTHROPIC_API_KEY) and add it to ALLOWED_ENV_VARS in sandbox.conf."
