name: CI

on:
  push:
    branches: [main, packaging, "ci/**"]
    paths-ignore: ['**.md', 'CHANGELOG.md', 'docs/**', 'LICENSE']
  pull_request:
    branches: [main]
    paths-ignore: ['**.md', 'CHANGELOG.md', 'docs/**', 'LICENSE']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ── Smoke: syntax + shellcheck gate ─────────────────────────────
  smoke:
    name: "Smoke (bash -n + shellcheck)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bash syntax check
        run: bash -n sandbox-exec.sh sandbox-lib.sh test.sh chaperon/chaperon.sh backends/bwrap.sh backends/firejail.sh backends/landlock.sh

      - name: ShellCheck (errors only)
        uses: ludeeus/action-shellcheck@master
        env:
          SHELLCHECK_OPTS: "-S error"
        with:
          severity: error
          additional_files: >-
            sandbox-exec.sh
            sandbox-lib.sh
            test.sh
            chaperon/chaperon.sh
            backends/bwrap.sh
            backends/firejail.sh
            backends/landlock.sh

  # ── Makefile install / uninstall ─────────────────────────────────
  makefile:
    name: "Makefile install (${{ matrix.prefix }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - prefix: "$HOME/.local"
            label: "user-local"
          - prefix: "/usr/local"
            label: "system-wide"
    steps:
      - uses: actions/checkout@v4

      - name: Install bubblewrap
        run: sudo apt-get update && sudo apt-get install -y bubblewrap

      - name: make install
        run: |
          if [[ "${{ matrix.prefix }}" == "/usr/local" ]]; then
            sudo make install PREFIX=/usr/local
          else
            make install PREFIX="$HOME/.local"
          fi

      - name: Verify agent-sandbox --version
        run: |
          if [[ "${{ matrix.prefix }}" == "/usr/local" ]]; then
            agent-sandbox --version
          else
            "$HOME/.local/bin/agent-sandbox" --version
          fi

      - name: Verify installed files
        run: |
          PREFIX="${{ matrix.prefix }}"
          # Expand ~ in user-local case
          [[ "$PREFIX" == '$HOME/.local' ]] && PREFIX="$HOME/.local"
          test -x "$PREFIX/bin/agent-sandbox"
          test -f "$PREFIX/lib/agent-sandbox/sandbox-exec.sh"
          test -f "$PREFIX/lib/agent-sandbox/sandbox-lib.sh"
          test -f "$PREFIX/lib/agent-sandbox/VERSION"
          test -f "$PREFIX/lib/agent-sandbox/sandbox.conf"
          test -d "$PREFIX/lib/agent-sandbox/agents/claude"
          test -d "$PREFIX/lib/agent-sandbox/chaperon/handlers"
          test -d "$PREFIX/lib/agent-sandbox/chaperon/stubs"
          test -d "$PREFIX/lib/agent-sandbox/backends"
          test -f "$PREFIX/share/doc/agent-sandbox/README.md"
          echo "All files present"

      - name: make install-conf
        run: make install-conf CONFDIR=/tmp/test-conf

      - name: Verify sandbox.conf created
        run: test -f /tmp/test-conf/sandbox.conf

      - name: make install-conf (idempotent)
        run: |
          echo "CUSTOM=true" >> /tmp/test-conf/sandbox.conf
          make install-conf CONFDIR=/tmp/test-conf 2>&1 | grep -q "already exists"
          grep -q "CUSTOM=true" /tmp/test-conf/sandbox.conf

      - name: make uninstall
        run: |
          if [[ "${{ matrix.prefix }}" == "/usr/local" ]]; then
            sudo make uninstall PREFIX=/usr/local
          else
            make uninstall PREFIX="$HOME/.local"
          fi

      - name: Verify uninstall removed files
        run: |
          PREFIX="${{ matrix.prefix }}"
          [[ "$PREFIX" == '$HOME/.local' ]] && PREFIX="$HOME/.local"
          ! test -e "$PREFIX/bin/agent-sandbox"
          ! test -e "$PREFIX/lib/agent-sandbox"
          ! test -e "$PREFIX/share/doc/agent-sandbox"
          echo "Clean uninstall"

  # ── DESTDIR packaging test ───────────────────────────────────────
  destdir:
    name: "DESTDIR packaging test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: make install with DESTDIR
        run: make install DESTDIR=/tmp/pkg PREFIX=/usr

      - name: Verify DESTDIR layout
        run: |
          test -x /tmp/pkg/usr/bin/agent-sandbox
          test -f /tmp/pkg/usr/lib/agent-sandbox/sandbox-exec.sh
          test -f /tmp/pkg/usr/lib/agent-sandbox/VERSION
          cat /tmp/pkg/usr/bin/agent-sandbox | grep -q '/usr/lib/agent-sandbox/sandbox-exec.sh'
          echo "DESTDIR layout correct"

  # ── Sandbox tests (bwrap) ───────────────────────────────────────
  test-bwrap:
    name: "Sandbox tests (bwrap)"
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-sandbox-host

      - name: Start an outer tmux server (for socket-isolation test)
        # Creates /tmp/tmux-$UID/, which the isolation assertion expects
        # to exist outside the sandbox and be hidden inside it. Without
        # this, the test skips on a vanilla ubuntu-latest runner.
        run: |
          tmux new-session -d -s ci-outer-tmux
          test -d "/tmp/tmux-$(id -u)"

      - name: Run full test suite (bwrap)
        # Section 6 (chaperon functional tests, submits real Slurm jobs)
        # auto-skips when sbatch is absent — clean on ubuntu-latest.
        # For live Slurm coverage, see the test-bwrap-slurm job.
        run: bash test.sh --backend bwrap --verbose

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ github.job }}
          path: |
            /tmp/chaperon-*
            /tmp/agent-sandbox-test-*
          if-no-files-found: ignore

  # ── Sandbox tests (landlock) ────────────────────────────────────
  test-landlock:
    name: "Sandbox tests (landlock)"
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-sandbox-host

      - name: Check Landlock support
        # ubuntu-latest kernels (>= 5.13) support Landlock. If the
        # --check probe reports unavailable here, that's a real
        # regression, not an environment quirk — fail the job.
        run: |
          if ! python3 backends/landlock-sandbox.py --check; then
            echo "::error::Landlock unavailable on ubuntu-latest — expected to work here."
            exit 1
          fi

      - name: Run full test suite (landlock)
        run: bash test.sh --backend landlock --verbose

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ github.job }}
          path: |
            /tmp/chaperon-*
            /tmp/agent-sandbox-test-*
          if-no-files-found: ignore

  # ── Sandbox tests (firejail) ────────────────────────────────────
  test-firejail:
    name: "Sandbox tests (firejail)"
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-sandbox-host

      - name: Install firejail
        run: sudo apt-get install -y firejail

      - name: Start an outer tmux server (for socket-isolation test)
        # See the matching step in test-bwrap for rationale.
        run: |
          tmux new-session -d -s ci-outer-tmux
          test -d "/tmp/tmux-$(id -u)"

      - name: Run full test suite (firejail)
        run: bash test.sh --backend firejail --verbose

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ github.job }}
          path: |
            /tmp/chaperon-*
            /tmp/agent-sandbox-test-*
          if-no-files-found: ignore

  # ── Live Slurm: chaperon functional tests (section 6) ───────────
  # ubuntu-latest has no Slurm; this job stands up a single-node
  # cluster via koesterlab/setup-slurm-action so test.sh section 6
  # (sbatch/srun via chaperon) actually exercises a real slurmctld.
  # The other backend jobs above run the same test.sh but section 6
  # auto-skips when sbatch is missing.
  test-bwrap-slurm:
    name: "Sandbox tests (bwrap, with live Slurm)"
    runs-on: ubuntu-latest
    needs: smoke
    # Quarantined: MySQL sidecar race + third-party ansible action make
    # this the highest flake surface in the matrix. Keep it running for
    # signal, but don't gate merges on it.
    continue-on-error: true
    # slurmdbd requires a MySQL accounting backend; the setup-slurm
    # action expects it at localhost:8888 per its ansible playbook.
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 8888:3306
        options: >-
          --health-cmd "mysqladmin ping -proot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-sandbox-host

      - name: Set up SLURM (single-node, via ansible-slurm)
        # Pinned to commit SHA for tag v1.1.0 (reproducibility).
        uses: koesterlab/setup-slurm-action@64af9c79b42ac48a24ac1b8e803c4e8b8c645725
        with:
          cpus: 2
          memory: 4000

      - name: Sanity-check Slurm is up
        run: |
          sinfo
          srun --version
          sbatch --wrap "echo hello-from-slurm" | grep -qE "Submitted batch job [0-9]+"

      - name: Create second user for cross-user Slurm visibility test
        run: |
          sudo useradd -m slurm-testuser
          # Register user in Slurm accounting (required for job submission)
          sudo sacctmgr -i add account testaccount 2>/dev/null || true
          sudo sacctmgr -i add user slurm-testuser account=testaccount 2>/dev/null || true
          # Submit and verify
          sudo -u slurm-testuser sbatch --wrap "sleep 300"
          # Confirm the job is visible
          squeue -u slurm-testuser -h -o "%i" | grep -qE "^[0-9]+$"

      - name: Start an outer tmux server (for socket-isolation test)
        # See the matching step in test-bwrap for rationale.
        run: |
          tmux new-session -d -s ci-outer-tmux
          test -d "/tmp/tmux-$(id -u)"

      - name: Run full test suite (bwrap) with live Slurm
        run: bash test.sh --backend bwrap --verbose

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ github.job }}
          path: |
            /tmp/chaperon-*
            /tmp/agent-sandbox-test-*
          if-no-files-found: ignore

  # ── sandbox-exec.sh CLI behavior ────────────────────────────────
  cli:
    name: "CLI behavior tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-sandbox-host

      - name: "--version outputs version"
        run: |
          out=$(./sandbox-exec.sh --version)
          echo "$out"
          echo "$out" | grep -qE '^agent-sandbox [0-9]+\.[0-9]+\.[0-9]+$'

      - name: "--version matches VERSION file"
        run: |
          file_ver=$(cat VERSION | tr -d '[:space:]')
          cli_ver=$(./sandbox-exec.sh --version | awk '{print $2}')
          [[ "$file_ver" == "$cli_ver" ]] || { echo "Mismatch: file=$file_ver cli=$cli_ver"; exit 1; }

      - name: "--help includes version"
        run: ./sandbox-exec.sh --help | head -1 | grep -q "agent-sandbox"

      - name: "Unknown option errors"
        run: |
          ! ./sandbox-exec.sh --bogus 2>/dev/null
          ./sandbox-exec.sh --bogus 2>&1 | grep -q "Unknown option"

      - name: "No command errors"
        run: |
          ! ./sandbox-exec.sh 2>/dev/null
          ./sandbox-exec.sh 2>&1 | grep -q "No command specified"

      - name: "Command without -- separator works"
        run: |
          out=$(./sandbox-exec.sh echo hello 2>/dev/null)
          [[ "$out" == "hello" ]] || { echo "Got: $out"; exit 1; }

      - name: "Command with -- separator works"
        run: |
          out=$(./sandbox-exec.sh -- echo hello 2>/dev/null)
          [[ "$out" == "hello" ]] || { echo "Got: $out"; exit 1; }

      - name: "Options + command without -- works"
        run: |
          out=$(./sandbox-exec.sh --backend bwrap echo hello 2>/dev/null)
          [[ "$out" == "hello" ]] || { echo "Got: $out"; exit 1; }

  # ── Homebrew formula validation ─────────────────────────────────
  homebrew:
    name: "Homebrew install test"
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - uses: ./.github/actions/setup-sandbox-host

      - name: Build and install from local source via Homebrew
        run: |
          # brew tap-new commits to a git repo — needs an identity on CI.
          git config --global user.name "CI" && git config --global user.email "ci@test"

          # Modern Homebrew requires formulae to live in a tap. Create a
          # local tap with a formula that points at a tarball of the checkout.
          TAR="/tmp/agent-sandbox-ci.tar.gz"
          tar czf "$TAR" --transform 's,^\./,agent_sandbox-ci/,' \
              --exclude='.git' --exclude='slurm-*.out' .
          SHA=$(shasum -a 256 "$TAR" | awk '{print $1}')

          brew tap-new ci/local
          cat > "$(brew --repository ci/local)/Formula/agent-sandbox.rb" <<EOF
          class AgentSandbox < Formula
            desc "Kernel-enforced filesystem isolation for AI coding agents on Linux"
            homepage "https://github.com/katosh/agent_sandbox"
            url "file://$TAR"
            version "0.0.0-ci"
            sha256 "$SHA"
            license "MIT"
            depends_on :linux
            def install
              system "make", "install", "PREFIX=#{prefix}"
            end
            test do
              assert_match "agent-sandbox", shell_output("#{bin}/agent-sandbox --version")
            end
          end
          EOF
          brew install --formula --build-from-source ci/local/agent-sandbox

      - name: Verify agent-sandbox on PATH
        run: |
          which agent-sandbox
          agent-sandbox --version

      - name: Smoke test from Homebrew install
        run: |
          out=$(agent-sandbox echo hello 2>/dev/null)
          [[ "$out" == "hello" ]] || { echo "Got: '$out'"; exit 1; }
          echo "Homebrew-installed sandbox works"
